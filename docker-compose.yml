services:
  storyteller:
    build: .
    ports:
      - "${STORY_PORT:-8000}:8000"
    env_file:
      - .env          # must define GEMINI_API_KEY=...
    environment:
      STORY_PREFETCH: "4"          # pages to draw ahead while reading
      STORY_WARM_PAGES: "2"        # first pages drawn during import (instant open)
      STORY_GEN_CONCURRENCY: "3"   # max simultaneous image generations
      # All text steps default to STORY_TEXT_MODEL (gemini-3.5-flash). Text spend
      # is negligible next to image generation, so we favour the stronger model
      # for reliable variant picks + cast inclusion (set STORY_ANALYZE_MODEL etc.
      # to gemini-3.1-flash-lite if you ever want to trade quality for cost).
    volumes:
      - ./data:/data  # sqlite DB + scratch work dirs + logs persist here
    restart: unless-stopped
