<!doctype html>
<html lang="en"><head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Storyteller — roster</title>
<link rel="manifest" href="/static/manifest.webmanifest" crossorigin="use-credentials">
<meta name="theme-color" content="#7a5c3e">
<link rel="apple-touch-icon" href="/static/icon-192.png">
<script>if ('serviceWorker' in navigator) navigator.serviceWorker.register('/sw.js').catch(()=>{});</script>
<style>
  :root { --bg:#f4efe6; --ink:#2b2622; --muted:#9a8a70; --panel:#fffdf8; --line:#e0d4bd; --accent:#7a5c3e; }
  * { box-sizing:border-box; }
  body { margin:0; background:var(--bg); color:var(--ink); font-family:Georgia,'Times New Roman',serif; }
  header { padding:22px 24px 6px; }
  a.back { font-family:system-ui,sans-serif; font-size:.85rem; color:var(--accent); text-decoration:none; }
  h1 { margin:.2em 0 0; font-size:1.6rem; }
  .sub { color:var(--muted); font-family:system-ui,sans-serif; font-size:.85rem; }
  main { max-width:1000px; margin:0 auto; padding:8px 24px 60px; }
  .entity { margin-top:22px; }
  .ehead { display:flex; align-items:baseline; gap:10px; border-bottom:1px solid var(--line); padding-bottom:6px; }
  .ehead h2 { margin:0; font-size:1.2rem; }
  .ehead .type { font-family:system-ui,sans-serif; font-size:.7rem; text-transform:uppercase; letter-spacing:.5px;
                 color:var(--muted); border:1px solid var(--line); border-radius:20px; padding:2px 8px; }
  .vgrid { display:grid; grid-template-columns:repeat(auto-fill,minmax(150px,1fr)); gap:14px; margin-top:12px; }
  .vcard { display:flex; flex-direction:column; gap:6px; }
  .frame { aspect-ratio:3/4; border:1px solid var(--line); border-radius:10px; overflow:hidden;
           background:var(--panel); display:flex; align-items:center; justify-content:center; }
  .frame img { width:100%; height:100%; object-fit:cover; display:block; }
  .placeholder { flex-direction:column; gap:6px; color:var(--muted); font-family:system-ui,sans-serif;
                 text-align:center; padding:10px;
                 background:repeating-linear-gradient(45deg,#f3ecdd,#f3ecdd 9px,#ece3d1 9px,#ece3d1 18px); }
  .placeholder .ph-name { font-weight:600; font-size:.85rem; color:var(--ink); }
  .placeholder .ph-tag { font-size:.68rem; }
  .vlabel { font-family:system-ui,sans-serif; font-size:.8rem; text-transform:capitalize; }
  .vwhen { font-family:system-ui,sans-serif; font-size:.7rem; color:var(--muted); }
  .legend { font-family:system-ui,sans-serif; font-size:.8rem; color:var(--muted); margin-top:6px; }
  .editbtn { font-family:system-ui,sans-serif; font-size:.72rem; color:var(--accent); background:none;
             border:1px solid var(--line); border-radius:20px; padding:3px 10px; cursor:pointer;
             align-self:flex-start; }
  .editbtn:hover { background:#fff; }
  #ov { position:fixed; inset:0; z-index:50; background:rgba(0,0,0,.45); display:flex;
        align-items:center; justify-content:center; padding:16px; font-family:system-ui,sans-serif; }
  #ov[hidden]{ display:none; }
  .dlg { background:var(--panel); border:1px solid var(--line); border-radius:16px; padding:20px;
         width:min(460px,94vw); max-height:92vh; overflow:auto; display:flex; flex-direction:column; gap:14px;
         box-shadow:0 14px 44px rgba(0,0,0,.34); }
  .dlg h3 { margin:0; font-family:Georgia,serif; font-size:1.15rem; }
  .dlg .who { color:var(--muted); font-size:.8rem; margin-top:-8px; }
  .dlg .prev { aspect-ratio:3/4; max-height:220px; align-self:center; border:1px solid var(--line);
               border-radius:10px; overflow:hidden; background:var(--bg); }
  .dlg .prev img { height:100%; width:auto; display:block; }
  .dlg textarea { font:inherit; font-size:.95rem; padding:10px; border-radius:9px; border:1px solid var(--line);
                  background:var(--bg); color:var(--ink); resize:vertical; min-height:74px; }
  .dlg .flabel { font-size:.68rem; letter-spacing:1px; text-transform:uppercase; color:var(--muted); }
  .models { display:flex; flex-wrap:wrap; gap:8px; }
  .models label { display:flex; align-items:center; gap:6px; border:1px solid var(--line); border-radius:9px;
                  padding:8px 11px; cursor:pointer; font-size:.9rem; background:var(--bg); }
  .models label:has(input:checked) { border-color:var(--accent); background:#fbf6ee; color:var(--accent); }
  .models small { color:var(--muted); font-size:.7rem; }
  .row { display:flex; gap:10px; }
  .dlg button.go, .dlg button.cancel { font:inherit; font-size:1rem; padding:10px; border-radius:9px;
         border:1px solid var(--line); cursor:pointer; flex:1; }
  .dlg button.go { background:var(--accent); color:#fff; border-color:var(--accent); }
  .dlg button.go:disabled { opacity:.55; cursor:default; }
  .dlg button.cancel { background:var(--bg); color:var(--ink); }
  .dlg .status { font-size:.82rem; color:var(--muted); min-height:1em; }
  .dlg .status.err { color:#9b3d2e; }
</style>
</head><body>
<header>
  <a class="back" id="back" href="#">&#8592; Book settings</a>
  <h1 id="title">Roster</h1>
  <div class="sub" id="sub"></div>
  <div id="bakebar" hidden style="margin-top:12px;padding:12px 14px;border:1px solid #d8d2c4;border-radius:10px;background:#faf7ef;display:flex;align-items:center;gap:14px;flex-wrap:wrap">
    <div id="bakemsg" style="flex:1 1 240px;font-size:14px"></div>
    <button id="bakego" style="padding:9px 16px;border:0;border-radius:8px;background:#7a5c2e;color:#fff;font-weight:600;cursor:pointer">Illustrate whole book</button>
    <button id="bakecancel" hidden style="padding:9px 16px;border:1px solid #b9532e;border-radius:8px;background:#fff;color:#b9532e;cursor:pointer">Cancel bake</button>
  </div>
</header>
<main id="main"></main>
<div id="ov" hidden><div class="dlg">
  <h3>Suggest an edit</h3>
  <div class="who" id="ovwho"></div>
  <div class="prev"><img id="ovimg" alt=""></div>
  <div class="flabel">What should change?</div>
  <textarea id="ovtext" placeholder="e.g. make her hair red, not blonde; remove the second sword; give him a green cloak"></textarea>
  <div class="flabel">Model</div>
  <div class="models">
    <label><input type="radio" name="ovmodel" value="pro" checked> Pro <small>Nano Banana Pro · best</small></label>
    <label><input type="radio" name="ovmodel" value="flash"> Flash <small>faster</small></label>
    <label><input type="radio" name="ovmodel" value="lite"> Lite <small>Nano Banana Lite · fastest</small></label>
  </div>
  <div class="status" id="ovstatus"></div>
  <div class="row">
    <button class="cancel" id="ovcancel">Cancel</button>
    <button class="go" id="ovgo">Render fix</button>
  </div>
</div></div>
<script>
const ID = __BOOK_ID__;
const $ = s => document.querySelector(s);
$("#back").href = "/settings/" + ID;

// Fetch JSON, treating an auth-proxy bounce (redirect / non-OK / login HTML) as
// "not signed in" rather than letting it render as blank or stale content.
async function getJSON(url, opts){
  const r = await fetch(url, Object.assign({cache:"no-store"}, opts));
  if (!r.ok || r.redirected) throw new Error("not signed in (HTTP " + r.status + ")");
  return r.json();   // login pages are HTML -> this throws, caught the same way
}
function signInPrompt(msg){
  $("#main").innerHTML = `<div style="font-family:system-ui,sans-serif;color:var(--muted);padding:28px 0">`
    + `⚠ ${msg} — your session may have expired. `
    + `<a href="#" onclick="location.reload();return false" style="color:var(--accent)">Sign in again</a>.</div>`;
}

(async () => {
  let b, roster;
  try {
    b = await getJSON("/api/books/"+ID);
    roster = await getJSON("/api/books/"+ID+"/roster");
  } catch (e) {
    signInPrompt("Couldn't load this roster");
    return;
  }
  $("#title").textContent = b.title + " — roster";
  const drawn = roster.reduce((n,e)=>n+e.variants.filter(v=>v.drawn).length,0);
  const total = roster.reduce((n,e)=>n+e.variants.length,0);
  $("#sub").textContent = `${roster.length} entities · ${drawn}/${total} reference sheets drawn (the rest draw as you read those scenes)`;
  $("#main").innerHTML = roster.map(e => `
    <div class="entity">
      <div class="ehead"><h2>${esc(e.name)}</h2><span class="type">${e.type}</span></div>
      <div class="vgrid">
        ${e.variants.map(v => v.drawn ? `
          <div class="vcard">
            <div class="frame"><img loading="lazy" id="sheet-${esc(e.entity_id)}-${esc(v.variant_id)}" src="/api/books/${ID}/sheet/${enc(e.entity_id)}/${enc(v.variant_id)}?v=${b.seg_ver}" alt="${esc(v.label)}"></div>
            <div class="vlabel">${esc(v.label)}</div>${v.when?`<div class="vwhen">${esc(v.when)}</div>`:""}
            <button class="editbtn" data-eid="${esc(e.entity_id)}" data-vid="${esc(v.variant_id)}" data-name="${esc(e.name)} — ${esc(v.label)}">&#9998; Suggest edit</button>
          </div>` : `
          <div class="vcard">
            <div class="frame placeholder">
              <span class="ph-name">${esc(e.name)}</span>
              <span class="ph-tag">${esc(v.label)}</span>
              <span class="ph-tag">— not drawn yet —</span>
            </div>
            <div class="vlabel">${esc(v.label)}</div>${v.when?`<div class="vwhen">${esc(v.when)}</div>`:""}
          </div>`).join("")}
      </div>
    </div>`).join("");
})();
function esc(s){ return (s||"").replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c])); }
function enc(s){ return encodeURIComponent(s); }

// --- sheet correction editor ---
let cur = null;   // { eid, vid } being edited
function sheetUrl(eid, vid){ return `/api/books/${ID}/sheet/${enc(eid)}/${enc(vid)}`; }
function openEditor(eid, vid, name){
  cur = { eid, vid };
  $("#ovwho").textContent = name;
  $("#ovtext").value = "";
  $("#ovimg").src = sheetUrl(eid, vid) + "?t=" + Date.now();
  setStatus("");
  $("#ovgo").disabled = false;
  $("#ov").hidden = false;
  $("#ovtext").focus();
}
function closeEditor(){ $("#ov").hidden = true; cur = null; }
function setStatus(msg, err){ const s = $("#ovstatus"); s.textContent = msg || ""; s.classList.toggle("err", !!err); }

async function submitEdit(){
  if (!cur) return;
  const instruction = $("#ovtext").value.trim();
  if (!instruction){ setStatus("Describe what to change first.", true); return; }
  const model = document.querySelector('input[name="ovmodel"]:checked').value;
  $("#ovgo").disabled = true;
  setStatus("Rendering… this can take up to a minute.");
  try {
    const r = await fetch(sheetUrl(cur.eid, cur.vid) + "/edit", {
      method:"POST", headers:{"Content-Type":"application/json"},
      body:JSON.stringify({ instruction, model }) });
    if (!r.ok){ const e = await r.json().catch(()=>({})); throw new Error(e.detail || ("HTTP "+r.status)); }
    const bust = "?t=" + Date.now();
    $("#ovimg").src = sheetUrl(cur.eid, cur.vid) + bust;   // refresh preview
    const card = document.getElementById(`sheet-${cur.eid}-${cur.vid}`);
    if (card) card.src = sheetUrl(cur.eid, cur.vid) + bust; // refresh the roster thumbnail
    setStatus("Done — updated. Edit again or close.");
  } catch (ex) {
    setStatus("Failed: " + ex.message, true);
  } finally {
    $("#ovgo").disabled = false;
  }
}

document.addEventListener("click", e => {
  const b = e.target.closest(".editbtn");
  if (b){ openEditor(b.dataset.eid, b.dataset.vid, b.dataset.name); return; }
  if (e.target === $("#ov")) closeEditor();
});
$("#ovcancel").onclick = closeEditor;
$("#ovgo").onclick = submitEdit;
document.addEventListener("keydown", e => { if (e.key === "Escape" && !$("#ov").hidden) closeEditor(); });

// ---- whole-book batch bake ----
let bakeTimer = null;
function renderBake(bake){
  const bar = $("#bakebar"), go = $("#bakego"), cancel = $("#bakecancel"), msg = $("#bakemsg");
  const st = bake && bake.status;
  if (!st){ bar.hidden = true; return; }
  bar.hidden = false;
  if (st === "baking"){
    go.hidden = true; cancel.hidden = false;
    msg.innerHTML = `<b>Illustrating…</b> ${bake.done_pages}/${bake.total_pages} pages `
      + `(round ${(bake.round||0)+1}). Runs in the background — you can leave this page.`;
  } else if (st === "done"){
    go.hidden = false; go.textContent = "Re-illustrate whole book"; cancel.hidden = true;
    msg.innerHTML = `<b>Done.</b> All ${bake.total_pages} pages illustrated at the batch (~50%-off) rate.`;
  } else if (st === "cancelled" || st === "failed"){
    go.hidden = false; go.textContent = "Illustrate whole book"; cancel.hidden = true;
    msg.innerHTML = st === "failed"
      ? `<b>Bake failed.</b> ${esc(bake.detail||"")} — you can retry.`
      : `Bake cancelled. Press to start again.`;
  } else { // roster_review or other pre-bake
    go.hidden = false; go.textContent = "Illustrate whole book"; cancel.hidden = true;
    msg.innerHTML = `Review & edit the roster above, then illustrate all `
      + `${bake.total_pages||""} pages in one batch (~50% cheaper, runs in the background).`;
  }
}
async function pollBake(){
  try {
    const bake = await (await fetch("/api/books/"+ID+"/bake")).json();
    renderBake(bake);
    if (bake && bake.status === "baking" && !bakeTimer) bakeTimer = setInterval(pollBake, 5000);
    if (bake && bake.status !== "baking" && bakeTimer){ clearInterval(bakeTimer); bakeTimer = null; }
  } catch (ex) { /* ignore transient */ }
}
$("#bakego").onclick = async () => {
  $("#bakego").disabled = true;
  const fresh = $("#bakego").textContent.startsWith("Re-");
  try {
    const r = await fetch("/api/books/"+ID+"/bake" + (fresh?"?fresh=1":""), {method:"POST"});
    if (!r.ok){ const e = await r.json().catch(()=>({})); throw new Error(e.detail||("HTTP "+r.status)); }
    await pollBake();
  } catch (ex){ $("#bakemsg").textContent = "Failed to start: " + ex.message; }
  finally { $("#bakego").disabled = false; }
};
$("#bakecancel").onclick = async () => {
  $("#bakecancel").disabled = true;
  try { await fetch("/api/books/"+ID+"/bake/cancel", {method:"POST"}); await pollBake(); }
  finally { $("#bakecancel").disabled = false; }
};
pollBake();
</script>
</body></html>
