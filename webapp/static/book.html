<!doctype html>
<html lang="en"><head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Storyteller — book</title>
<link rel="manifest" href="/static/manifest.webmanifest" crossorigin="use-credentials">
<meta name="theme-color" content="#7a5c3e">
<link rel="apple-touch-icon" href="/static/icon-192.png">
<script>
  if ('serviceWorker' in navigator) navigator.serviceWorker.register('/sw.js').catch(()=>{});
  let _wl = null;
  async function _keepAwake(){ try { if ('wakeLock' in navigator) _wl = await navigator.wakeLock.request('screen'); } catch(e){} }
  document.addEventListener('visibilitychange', () => { if (document.visibilityState === 'visible') _keepAwake(); });
  _keepAwake();
</script>
<style>
  :root { --bg:#f4efe6; --ink:#2b2622; --muted:#9a8a70; --panel:#fffdf8; --line:#e0d4bd;
          --pad:30px; --gap:54px; --mh:42px; }
  * { box-sizing:border-box; }
  html,body { margin:0; height:100%; background:var(--bg); color:var(--ink);
              font-family:Georgia,'Times New Roman',serif; -webkit-tap-highlight-color:transparent;
              overflow:hidden; }
  #viewport { position:fixed; inset:0; overflow:hidden; }
  /* the flowing text laid into vertical columns that extend horizontally; we
     translate it to "turn pages". column-fill:auto + fixed height = real pages. */
  #flow { position:absolute; top:0; bottom:0; left:var(--mh); right:var(--mh);
          padding:var(--pad) 0 50px; column-gap:var(--gap); column-fill:auto;
          transition:transform .40s cubic-bezier(.33,0,.2,1); will-change:transform; }
  /* a soft shadow that sweeps across as a page turns, for depth */
  #turn { position:fixed; top:0; bottom:0; width:140px; z-index:25; pointer-events:none; opacity:0;
          background:linear-gradient(90deg, transparent, rgba(40,30,20,.20), transparent); }
  #turn.fwd  { animation:sweepfwd .42s ease; }
  #turn.back { animation:sweepback .42s ease; }
  @keyframes sweepfwd  { 0%{opacity:0; transform:translateX(100vw);} 25%{opacity:1;} 100%{opacity:0; transform:translateX(-140px);} }
  @keyframes sweepback { 0%{opacity:0; transform:translateX(-140px);} 25%{opacity:1;} 100%{opacity:0; transform:translateX(100vw);} }
  @media (orientation:landscape){ #flow{ column-count:2; } }
  @media (orientation:portrait){  #flow{ column-count:1; } }
  #flow .chtitle { font-size:calc(1.5rem * var(--fs,1)); margin:0 0 .7em; }
  #flow .chtitle .ch { display:block; font-family:system-ui,sans-serif; font-size:.72rem;
          letter-spacing:2px; text-transform:uppercase; color:var(--muted); margin-bottom:.3em; }
  #flow p { font-size:calc(1.18rem * var(--fs,1)); line-height:1.62; margin:0 0 1em; text-align:justify; hyphens:auto; }
  #flow figure { margin:0 0 1em; break-inside:avoid; aspect-ratio:3/2; border-radius:10px;
          overflow:hidden; background:#ece3d2; box-shadow:0 4px 16px rgba(0,0,0,.16); }
  /* until the image has loaded, the figure is a gentle pulsing placeholder box */
  #flow figure:not(:has(img.on)) { animation:phpulse 1.5s ease-in-out infinite; }
  @keyframes phpulse { 0%,100%{ background:#ece3d2; } 50%{ background:#e6dcc6; } }
  #flow figure img { width:100%; height:100%; object-fit:cover; display:block;
          opacity:0; transition:opacity .45s; }
  #flow figure img.on { opacity:1; }

  .edge { position:fixed; top:50%; transform:translateY(-50%); z-index:5; pointer-events:none;
          font-size:2.2rem; color:rgba(43,38,34,.16); font-family:system-ui,sans-serif; }
  .edge.left{ left:8px; } .edge.right{ right:8px; }
  #bar { position:fixed; left:0; bottom:0; height:3px; background:var(--muted); z-index:20; transition:width .2s; }
  #pageno { position:fixed; bottom:6px; left:50%; transform:translateX(-50%); z-index:20;
          font-family:system-ui,sans-serif; font-size:.72rem; color:var(--muted); }
  #menuBtn { position:fixed; top:10px; right:10px; z-index:30; width:40px; height:40px; border-radius:50%;
          border:1px solid var(--line); background:rgba(255,253,248,.82); color:var(--ink);
          font-size:1.15rem; cursor:pointer; backdrop-filter:blur(3px); }
  #menu { position:fixed; inset:0; z-index:40; background:rgba(0,0,0,.4); display:flex;
          align-items:center; justify-content:center; }
  #menu[hidden]{ display:none; }
  .card { background:var(--panel); border:1px solid var(--line); border-radius:16px; padding:20px;
          width:min(360px,88vw); display:flex; flex-direction:column; gap:14px;
          font-family:system-ui,sans-serif; box-shadow:0 12px 40px rgba(0,0,0,.3); }
  .card .bk { font-weight:bold; font-family:Georgia,serif; }
  .card label { display:flex; flex-direction:column; gap:5px; font-size:.7rem; letter-spacing:1px;
          text-transform:uppercase; color:var(--muted); }
  .card select, .card button, .card a.btn { font:inherit; font-size:1rem; padding:10px; border-radius:9px;
          border:1px solid var(--line); background:var(--bg); color:var(--ink); cursor:pointer; text-decoration:none; text-align:center; }
  #closebook { color:#9b3d2e; border-color:#e3c0b0; background:#fbf1ec; }
  .card label.toggle { flex-direction:row; align-items:center; gap:10px; text-transform:none;
          letter-spacing:0; font-size:.95rem; color:var(--ink); cursor:pointer; }
  .card label.toggle input { width:auto; margin:0; }
  .fsrow { display:flex; align-items:center; gap:10px; }
  .fsrow .lab { flex:1; font-size:.7rem; letter-spacing:1px; text-transform:uppercase; color:var(--muted); }
  .fsrow button { width:44px; padding:8px 0; font-size:1.05rem; }
  .fsrow #fsval { min-width:48px; text-align:center; font-size:.9rem; color:var(--ink); }
  body.noanim #flow { transition:none; }
  #splash { position:fixed; inset:0; z-index:60; background:var(--bg); display:flex; align-items:center;
          justify-content:center; font-family:system-ui,sans-serif; color:var(--muted); }
  #splash[hidden]{ display:none; }
  #flow figure img.on { cursor:zoom-in; }
  #zoom { position:fixed; inset:0; z-index:70; background:rgba(20,16,12,.94); display:flex;
          align-items:center; justify-content:center; cursor:zoom-out; animation:zfade .18s ease; }
  #zoom[hidden]{ display:none; }
  #zoom img { max-width:100%; max-height:100%; object-fit:contain; }
  @keyframes zfade { from{ opacity:0; } to{ opacity:1; } }
</style>
</head><body>
<div id="viewport"><div id="flow"></div></div>
<div class="edge left">&#8249;</div><div class="edge right">&#8250;</div>
<div id="turn"></div>
<div id="bar"></div><div id="pageno"></div>
<button id="menuBtn">&#9776;</button>
<div id="menu" hidden><div class="card">
  <div class="bk" id="bk"></div>
  <label>Chapter <select id="chap"></select></label>
  <label class="toggle"><input type="checkbox" id="animchk"> Page-turn animation</label>
  <div class="fsrow"><span class="lab">Text size</span>
    <button id="fsdown" aria-label="Smaller text">A&#8722;</button>
    <span id="fsval">100%</span>
    <button id="fsup" aria-label="Larger text">A+</button></div>
  <a class="btn" id="classic">Switch to single-page view</a>
  <button id="fs">&#9974; Full screen</button>
  <button id="update">&#8635; Check for updates</button>
  <button id="closebook">&#10005; Close book</button>
  <button id="close">Close menu</button>
</div></div>
<div id="zoom" hidden><img alt=""></div>
<div id="splash">Loading…</div>
<script>
const BOOK_ID = __BOOK_ID__;
const BUILD = "__BUILD__";   // front-end build this page was served with
const API = "/api/books/" + BOOK_ID;
const $ = s => document.querySelector(s);
const LKEY = "book:" + BOOK_ID;
let META = null, CH = -1, page = 0, pages = 1, prefetched = new Set();
const ANIM_KEY = "book:anim";
let animOn = true;
try { animOn = localStorage.getItem(ANIM_KEY) !== "0"; } catch(e){}
function applyAnim(){ document.body.classList.toggle("noanim", !animOn); if($("#animchk")) $("#animchk").checked = animOn; }

const FS_KEY = "book:fs";
let fontScale = 1;
try { fontScale = parseFloat(localStorage.getItem(FS_KEY)) || 1; } catch(e){}
function applyFont(){ document.documentElement.style.setProperty("--fs", fontScale);
  if ($("#fsval")) $("#fsval").textContent = Math.round(fontScale*100) + "%"; }
function setFont(delta){
  fontScale = Math.min(1.8, Math.max(0.7, Math.round((fontScale + delta)*100)/100));
  try { localStorage.setItem(FS_KEY, fontScale); } catch(e){}
  applyFont();
  // text reflows -> re-paginate, staying near the same place in the chapter
  const frac = page / Math.max(1, pages);
  requestAnimationFrame(() => { paginate(); goPage(Math.round(frac*pages), true); });
}

async function boot(){
  try {
    const r = await fetch(API);
    if (!r.ok || r.redirected) throw new Error("auth");
    META = await r.json();   // a login page is HTML -> throws, handled below
  } catch(e){
    $("#splash").innerHTML = `Couldn't load — check your connection or `
      + `<a href="#" onclick="location.reload();return false" style="color:var(--muted);text-decoration:underline">sign in again</a>.`;
    return;
  }
  if (META.status !== "ready"){ $("#splash").textContent = "Still processing… " + (META.detail||""); setTimeout(boot,3000); return; }
  $("#bk").textContent = META.title;
  $("#chap").innerHTML = (META.chapters||[]).map(c => `<option value="${c.idx}">${c.title}</option>`).join("");
  let start = { ch:0, page:0 }, localT = 0;
  try { const s = JSON.parse(localStorage.getItem(LKEY)); if (s){ start = s; localT = s.t || 0; } } catch(e){}
  // Cross-device sync: if another device saved a newer position to the server,
  // resume from that (mapped back onto this reflowed view) rather than this
  // device's stale local page. Local wins on a tie so an offline read isn't lost.
  let startFrac = null;
  if ((META.position_at || 0) > localT && META.num_pages){
    const at = posToChapterFrac(META.position || 0);
    start = { ch: at.ch, page: 0 }; startFrac = at.frac;
  }
  $("#splash").hidden = true;
  applyAnim();
  applyFont();
  await loadChapter(start.ch || 0, start.page || 0, startFrac);
}

async function loadChapter(ci, toPage, frac){
  CH = ci;
  const data = await (await fetch(`${API}/chapter/${ci}`)).json();
  const flow = $("#flow");
  setX(0, false);   // jump (no transition) to the start so a new chapter doesn't
                    // animate a long slide back from the previous chapter's last page
  const html = [`<h2 class="chtitle"><span class="ch">${data.title}</span></h2>`];
  for (const n of data.nodes){
    if (n.type === "text")
      html.push(n.text.split(/\n\s*\n/).map(t => `<p>${esc(t.trim())}</p>`).join(""));
    else
      html.push(`<figure><img alt="${esc(n.alt||"")}" data-src="${n.src}" onload="this.classList.add('on')" onerror="imgRetry(this)"></figure>`);
  }
  flow.innerHTML = html.join("");
  $("#chap").value = ci;
  // images: reserve space via aspect-ratio (stable layout) then lazy-load in reading order
  imgs = [...flow.querySelectorAll("img")];
  await new Promise(r => requestAnimationFrame(()=>requestAnimationFrame(r)));
  paginate();
  const target = frac != null ? Math.round(frac * (pages - 1))
                              : (toPage === -1 ? pages-1 : Math.min(toPage||0, pages-1));
  goPage(target, true);
}

function esc(s){ return s.replace(/[&<>]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[c])); }

let imgs = [];
// One "page" advances by the full column repeat = visible column area + one gap
// (NOT window width -- that drifts by a gap per page and clips the left column).
function stride(){
  const f = $("#flow");
  return f.clientWidth + (parseFloat(getComputedStyle(f).columnGap) || 0);
}
function paginate(){
  const f = $("#flow");
  pages = Math.max(1, Math.ceil((f.scrollWidth + (parseFloat(getComputedStyle(f).columnGap)||0)) / stride()));
}
// Move the flow. animate=false jumps with no transition (used for chapter loads,
// resizes, and the initial render) so we never animate a long slide between
// chapters; animate=true uses the CSS page-turn transition (when enabled).
function setX(px, animate){
  const f = $("#flow");
  if (animate && animOn){
    f.style.transition = "";
    f.style.transform = `translateX(${px}px)`;
  } else {
    f.style.transition = "none";
    f.style.transform = `translateX(${px}px)`;
    void f.offsetWidth;          // commit the jump before any later animated move
    f.style.transition = "";
  }
}
function goPage(n, force){
  page = Math.max(0, Math.min(pages-1, n));
  setX(-page*stride(), !force);   // force => jump (no page-turn animation)
  $("#bar").style.width = ((page+1)/pages*100) + "%";
  $("#pageno").textContent = `${(META.chapters[CH]||{}).title||""} — ${page+1}/${pages}`;
  loadVisibleImages();
  save();
}

// Load whatever is actually on (or near) the screen. We scan getBoundingClientRect
// -- which reflects the page-turn transform -- instead of computing a page index
// from offsetLeft, which is unreliable inside a CSS multi-column layout and broke
// when paging backwards. Request each near image once; reveal it once it's ready.
function loadVisibleImages(){
  const W = window.innerWidth;
  for (const im of imgs){
    const r = im.getBoundingClientRect();
    const near = r.right > -1.5*W && r.left < 2.5*W;   // current spread +/- ~1.5 screens
    if (near && im.dataset.src && !im.src) im.src = im.dataset.src;   // request once
    if (im.complete && im.naturalWidth) im.classList.add("on");       // cached/loaded -> show
  }
}
// The image endpoint returns 202 while the server renders the page in the
// background (~30-40s), so poll: drop the src and re-request on a steady cadence.
// Patient enough to outlast a slow render, then give up so a real failure stops.
function imgRetry(im){
  const n = (+im.dataset.tries || 0) + 1; im.dataset.tries = n;
  if (n > 45) return;                     // ~90s of polling
  im.removeAttribute("src");
  setTimeout(loadVisibleImages, 2000);
}

function sweep(dir){
  if (!animOn) return;
  const t = $("#turn"); t.classList.remove("fwd","back");
  void t.offsetWidth;           // restart the animation
  t.classList.add(dir);
}
async function next(){
  if (page < pages-1){ sweep("fwd"); goPage(page+1); }
  else if (CH < (META.chapters||[]).length-1) await loadChapter(CH+1, 0);
}
async function prev(){
  if (page > 0){ sweep("back"); goPage(page-1); }
  else if (CH > 0) await loadChapter(CH-1, -1);
}
function save(){ try{ localStorage.setItem(LKEY, JSON.stringify({ch:CH, page, t:Date.now()/1000})); }catch(e){} reportProgress(); }

// Inverse of reportProgress: map the server's global page index back onto this
// reflowed view (which chapter, and how far through it) so a position saved on
// another device resumes at roughly the right spot here.
function posToChapterFrac(pos){
  const chs = META.chapters || [];
  if (!chs.length) return { ch:0, frac:0 };
  let i = 0;
  for (let k = 0; k < chs.length; k++){ if ((chs[k].first_page||0) <= pos) i = k; else break; }
  const start = chs[i].first_page || 0;
  const end = (i + 1 < chs.length) ? (chs[i + 1].first_page || META.num_pages) : META.num_pages;
  const span = Math.max(1, end - start);
  const frac = Math.min(1, Math.max(0, (pos - start) / Math.max(1, span - 1)));
  return { ch: chs[i].idx, frac };
}

// The library progress bar keys off the server-side global page index
// (position / num_pages). This view paginates by chapter + reflowed page, so map
// the current spot onto that index: chapter start + how far through the chapter we
// are. Debounced so a flurry of page turns is one write.
let progT = null;
function reportProgress(){
  if (!META || !META.num_pages) return;
  const chs = META.chapters || [];
  const i = chs.findIndex(c => c.idx === CH);
  if (i < 0) return;
  const start = chs[i].first_page || 0;
  const end = (i + 1 < chs.length) ? (chs[i + 1].first_page || META.num_pages) : META.num_pages;
  const span = Math.max(1, end - start);
  const frac = pages > 1 ? page / (pages - 1) : 1;     // 0 at chapter start, 1 at its last page
  const pos = Math.min(META.num_pages - 1, Math.max(0, Math.round(start + frac * (span - 1))));
  clearTimeout(progT);
  progT = setTimeout(() => {
    fetch(API + "/progress", {method:"PUT", headers:{"Content-Type":"application/json"},
      body:JSON.stringify({position:pos})}).catch(()=>{});
  }, 600);
}

// nav: tap zones + swipe + keys
let tx=null, ty=null, moved=false;
document.addEventListener("touchstart", e=>{ tx=e.touches[0].clientX; ty=e.touches[0].clientY; moved=false; }, {passive:true});
document.addEventListener("touchmove", e=>{ if(tx!==null && (Math.abs(e.touches[0].clientX-tx)>10||Math.abs(e.touches[0].clientY-ty)>10)) moved=true; }, {passive:true});
document.addEventListener("touchend", e=>{ if(tx===null) return; const dx=e.changedTouches[0].clientX-tx, dy=e.changedTouches[0].clientY-ty; tx=null;
  if(!$("#zoom").hidden) return;   // no page turns while an image is zoomed
  if(Math.abs(dx)>50 && Math.abs(dx)>Math.abs(dy)){ moved=true; dx<0?next():prev(); } }, {passive:true});
// tapping a loaded image blows it up to fullscreen; tap again to return
function openZoom(im){ const z=$("#zoom"); const zi=z.firstElementChild;
  zi.src = im.currentSrc || im.src; zi.alt = im.alt || ""; z.hidden = false; }
function closeZoom(){ const z=$("#zoom"); z.hidden = true; z.firstElementChild.removeAttribute("src"); }
document.addEventListener("click", e=>{
  if(moved){ moved=false; return; }
  if(!$("#zoom").hidden){ closeZoom(); return; }   // any tap while zoomed = back
  if(!$("#menu").hidden) return;
  const img = e.target.closest("#flow figure img.on");
  if(img){ openZoom(img); return; }                // don't turn the page on an image tap
  if(e.target.closest("#menuBtn,#menu")) return;
  (e.clientX/window.innerWidth < 0.5) ? prev() : next();
});
document.addEventListener("keydown", e=>{
  if(e.key==="ArrowRight"||e.key===" "){ next(); e.preventDefault(); }
  if(e.key==="ArrowLeft") prev();
  if(e.key==="Escape"){ if(!$("#zoom").hidden) closeZoom(); else $("#menu").hidden=true; }
});

$("#menuBtn").onclick = e=>{ e.stopPropagation(); $("#menu").hidden=false; };
$("#menu").onclick = e=>{ if(e.target===$("#menu")) $("#menu").hidden=true; e.stopPropagation(); };
$("#close").onclick = e=>{ e.stopPropagation(); $("#menu").hidden=true; };
$("#chap").onchange = e=>{ $("#menu").hidden=true; loadChapter(+e.target.value, 0); };
$("#animchk").onchange = e=>{ animOn=e.target.checked; try{localStorage.setItem(ANIM_KEY, animOn?"1":"0");}catch(_){} applyAnim(); };
$("#fsdown").onclick = e=>{ e.stopPropagation(); setFont(-0.1); };
$("#fsup").onclick = e=>{ e.stopPropagation(); setFont(0.1); };
$("#update").onclick = async e=>{
  e.stopPropagation();
  const btn = $("#update"); const label = btn.innerHTML; btn.textContent = "Checking…";
  let latest = BUILD;
  try { latest = (await (await fetch("/api/version", {cache:"no-store"})).json()).version; } catch(_){}
  try { const r = await navigator.serviceWorker?.getRegistration(); if (r) await r.update(); } catch(_){}
  if (latest && latest !== BUILD){
    btn.textContent = "Updating…";
    // the SW serves the shell stale-while-revalidate, so clear the cache to force
    // a truly fresh load of the new build on this reload (not the next one)
    try { const ks = await caches.keys(); await Promise.all(ks.map(k => caches.delete(k))); } catch(_){}
    location.reload();
  }
  else { btn.textContent = "✓ Up to date"; setTimeout(()=>{ btn.innerHTML = label; }, 2000); }
};
$("#classic").href = "/read/" + BOOK_ID;
const fsEl = document.documentElement;
const inFS = ()=>document.fullscreenElement||document.webkitFullscreenElement;
$("#fs").onclick = e=>{ e.stopPropagation(); try{ inFS()?(document.exitFullscreen||document.webkitExitFullscreen).call(document):(fsEl.requestFullscreen||fsEl.webkitRequestFullscreen).call(fsEl);}catch(_){} };
$("#closebook").onclick = e=>{ e.stopPropagation(); try{ if(inFS())(document.exitFullscreen||document.webkitExitFullscreen).call(document);}catch(_){}; window.location.href="/"; };

let rt=null;
window.addEventListener("resize", ()=>{ clearTimeout(rt); rt=setTimeout(()=>{ const frac=page/Math.max(1,pages); paginate(); goPage(Math.round(frac*pages), true); }, 200); });
// re-scan once the page-turn animation lands (the goPage() call runs before the
// transform has moved); also reveal any images that finished loading meanwhile
$("#flow").addEventListener("transitionend", e => { if (e.propertyName === "transform") loadVisibleImages(); });
boot();
</script>
</body></html>
