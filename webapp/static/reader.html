<!doctype html>
<html lang="en"><head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Storyteller — read-aloud</title>
<link rel="manifest" href="/static/manifest.webmanifest" crossorigin="use-credentials">
<meta name="theme-color" content="#7a5c3e">
<link rel="apple-touch-icon" href="/static/icon-192.png">
<script>
  if ('serviceWorker' in navigator) navigator.serviceWorker.register('/sw.js').catch(()=>{});
  let _wl = null;
  async function _keepAwake(){ try { if ('wakeLock' in navigator) _wl = await navigator.wakeLock.request('screen'); } catch(e){} }
  document.addEventListener('visibilitychange', () => { if (document.visibilityState === 'visible') _keepAwake(); });
  _keepAwake();
</script>
<style>
  :root { --bg:#f4efe6; --ink:#2b2622; --muted:#9a8a70; --panel:#fffdf8; --line:#e0d4bd; }
  * { box-sizing:border-box; }
  html,body { margin:0; height:100%; background:var(--bg); color:var(--ink);
              font-family:Georgia,'Times New Roman',serif; -webkit-tap-highlight-color:transparent; }
  #app { position:relative; height:100dvh; overflow:hidden; }

  main { position:absolute; inset:0; display:flex; gap:24px; padding:24px; min-height:0; }
  .art { display:flex; align-items:center; justify-content:center; position:relative; }
  .art img { max-width:100%; border-radius:14px; box-shadow:0 8px 30px rgba(0,0,0,.22); background:#fff; }
  .art img.loading { opacity:0; }
  .spinner { position:absolute; display:flex; flex-direction:column; align-items:center; gap:12px;
             color:var(--muted); font-family:system-ui,sans-serif; font-size:.85rem; }
  .spinner.hidden { display:none; }
  .ring { width:38px; height:38px; border:4px solid var(--line); border-top-color:var(--muted);
          border-radius:50%; animation:spin 1s linear infinite; }
  @keyframes spin { to { transform:rotate(360deg); } }
  .read .ch { font-size:.75rem; letter-spacing:2px; text-transform:uppercase; color:var(--muted);
              font-family:system-ui,sans-serif; }
  .read h2 { font-size:1.5rem; margin:.15em 0 .5em; }
  .read p { font-size:clamp(1.15rem, 1rem + 1vw, 1.7rem); line-height:1.75; margin:0 0 1.2em; }

  @media (orientation:landscape) {
    main { flex-direction:row; align-items:stretch; justify-content:center; overflow:hidden; }
    .art { flex:1 1 55%; height:100%; }
    .art img { max-height:100%; }
    .read { flex:1 1 45%; max-width:640px; max-height:100%; overflow:auto; padding-right:4px; }
  }
  @media (orientation:portrait) {
    main { flex-direction:column; align-items:stretch; gap:14px; padding:16px; overflow-y:auto;
           -webkit-overflow-scrolling:touch; }
    .art { position:sticky; top:0; z-index:2; flex:none; background:var(--bg); padding-bottom:10px; min-height:40vh; }
    .art img { max-height:52vh; }
    .read { flex:none; padding-bottom:40vh; }
  }

  .edge { position:fixed; top:50%; transform:translateY(-50%); z-index:5; pointer-events:none;
          font-size:2.4rem; color:rgba(43,38,34,.16); font-family:system-ui,sans-serif; user-select:none; }
  .edge.left { left:10px; }  .edge.right { right:10px; }

  #menuBtn { position:fixed; top:10px; left:10px; z-index:30; width:40px; height:40px; border-radius:50%;
             border:1px solid var(--line); background:rgba(255,253,248,.82); color:var(--ink);
             font-size:1.15rem; line-height:1; cursor:pointer; backdrop-filter:blur(3px); }
  #menu { position:fixed; inset:0; z-index:40; background:rgba(0,0,0,.4);
          display:flex; align-items:center; justify-content:center; }
  #menu[hidden] { display:none; }
  .menucard { background:var(--panel); border:1px solid var(--line); border-radius:16px; padding:20px;
              width:min(360px,88vw); display:flex; flex-direction:column; gap:16px;
              box-shadow:0 12px 40px rgba(0,0,0,.3); font-family:system-ui,sans-serif; }
  .menucard .bk { font-weight:bold; font-size:1.05rem; font-family:Georgia,serif; }
  #closebook { width:100%; color:#9b3d2e; border-color:#e3c0b0; background:#fbf1ec; }
  .menucard label { display:flex; flex-direction:column; gap:5px; font-size:.72rem;
                    letter-spacing:1px; text-transform:uppercase; color:var(--muted); }
  .menucard select { font:inherit; font-size:1rem; padding:9px; border:1px solid var(--line);
                     border-radius:8px; background:var(--bg); color:var(--ink); }
  .menucard .row { display:flex; align-items:center; gap:12px; }
  .menucard button { font:inherit; font-size:1rem; padding:10px 18px; cursor:pointer;
                     background:var(--bg); border:1px solid var(--line); border-radius:10px; color:var(--ink); }
  .menucard button:disabled { opacity:.35; }
  .pos { margin:0 auto; color:var(--muted); font-size:.9rem; }
  #close { width:100%; }
  #bar { position:fixed; left:0; bottom:0; height:3px; background:var(--muted); z-index:20;
         transition:width .15s ease; }
  #splash { position:fixed; inset:0; z-index:60; background:var(--bg); display:flex;
            flex-direction:column; align-items:center; justify-content:center; gap:16px;
            font-family:system-ui,sans-serif; color:var(--muted); text-align:center; padding:24px; }
  #splash.hidden { display:none; }
</style>
</head><body>
<div id="app">
  <button id="menuBtn" aria-label="Menu">&#9776;</button>
  <main>
    <div class="art">
      <img id="img" alt="" class="loading">
      <div class="spinner" id="spinner"><div class="ring"></div><span id="spinmsg">drawing this page…</span></div>
    </div>
    <div class="read">
      <div class="ch" id="ch"></div>
      <h2 id="title"></h2>
      <p id="text"></p>
    </div>
  </main>
  <div class="edge left">&#8249;</div>
  <div class="edge right">&#8250;</div>
  <div id="bar"></div>

  <div id="menu" hidden>
    <div class="menucard">
      <div class="bk" id="bk"></div>
      <label>Chapter <select id="chap"></select></label>
      <div class="row">
        <button id="prev">&#8249; Back</button>
        <span class="pos" id="pos"></span>
        <button id="next">Next &#8250;</button>
      </div>
      <button id="bookview">&#128214; Book view (two-column)</button>
      <button id="fs">&#9974; Full screen</button>
      <button id="closebook">&#10005; Close book</button>
      <button id="close">Close menu</button>
    </div>
  </div>
</div>
<div id="splash"><div class="ring"></div><span id="splashmsg">Loading…</span></div>
<script src="/static/auth.js"></script>
<script>
const BOOK_ID = __BOOK_ID__;
const API = "/api/books/" + BOOK_ID;
const $ = s => document.querySelector(s);
let DATA = { title:"", pages:[], chapters:[] };
let state = { i:0 };
const LKEY = "reader:" + BOOK_ID;

async function boot(){
  let meta;
  try {
    const r = await fetch(API);
    if (Auth.bounced(r)) return;   // expired session -> sign-in overlay
    if (!r.ok) throw new Error("auth");
    meta = await r.json();   // a login page is HTML -> throws, handled below
  } catch(e) {
    Auth.fail({offline: true});
    return;
  }
  if (meta.status !== "ready") {
    $("#splashmsg").innerHTML = `<b>${meta.title||"This book"}</b> is still processing…<br>` +
      `<span style="font-size:.85rem">${meta.detail||meta.status}</span>`;
    setTimeout(boot, 3000);
    return;
  }
  DATA.title = meta.title;
  DATA.segVer = meta.seg_ver || 0;
  DATA.chapters = meta.chapters || [];
  DATA.pages = await (await fetch(API + "/pages")).json();
  // Reading position syncs across devices through the server; localStorage is a
  // per-device cache. Resume from whichever was written most recently, so opening
  // the book on another device picks up where you actually left off (while an
  // offline local read still wins until it manages to sync back).
  state.i = Math.min(meta.position || 0, DATA.pages.length - 1);
  try {
    const s = JSON.parse(localStorage.getItem(LKEY));
    if (s && s.i != null && (s.t || 0) >= (meta.position_at || 0))
      state.i = Math.min(s.i, DATA.pages.length - 1);
  } catch(e){}

  $("#bk").textContent = DATA.title;
  $("#chap").innerHTML = DATA.chapters.map(c =>
    `<option value="${c.first_page}">${c.title}</option>`).join("");
  $("#splash").classList.add("hidden");
  render();
}

let saveTimer = null;
function save(){
  try { localStorage.setItem(LKEY, JSON.stringify({i:state.i, t:Date.now()/1000})); } catch(e){}
  clearTimeout(saveTimer);
  saveTimer = setTimeout(() => {
    fetch(API + "/progress", {method:"PUT", headers:{"Content-Type":"application/json"},
      body:JSON.stringify({position:state.i})}).catch(()=>{});
  }, 600);
}

// Pre-load upcoming page images into the browser cache so hitting "next" is
// instant: the backend already generates ahead; this makes the client download
// + decode ahead too, using the SAME URL the <img> will request (so it's a cache
// hit). new Image() requests are low-priority and don't block the visible image.
const FE_PREFETCH = 3;
const _prefetched = new Set();
function prefetchAhead(){
  for (let k = 1; k <= FE_PREFETCH; k++){
    const j = state.i + k;
    if (j >= DATA.pages.length) break;
    const url = API + "/pages/" + DATA.pages[j].idx + "/image?v=" + DATA.segVer;
    if (_prefetched.has(url)) continue;
    _prefetched.add(url);
    const im = new Image();
    im.decoding = "async";
    im.src = url;            // browser fetches + caches; backend generates if needed
  }
}

let curReq = 0;
function render(){
  const p = DATA.pages[state.i];
  const img = $("img"), spin = $("#spinner");
  const req = ++curReq;
  img.classList.add("loading");
  spin.classList.remove("hidden");
  $("#spinmsg").textContent = "drawing this page…";
  let tries = 0;
  img.onload = () => { if (req===curReq){ img.classList.remove("loading"); spin.classList.add("hidden"); } };
  // the endpoint returns 202 while it renders in the background (~30-40s) -> poll
  img.onerror = () => {
    if (req !== curReq) return;
    if (++tries > 45){ $("#spinmsg").textContent = "couldn't draw this one — tap to retry"; return; }
    setTimeout(() => { if (req===curReq) img.src = API + "/pages/" + p.idx + "/image?v=" + DATA.segVer + "&r=" + tries; }, 2000);
  };
  img.src = API + "/pages/" + p.idx + "/image?v=" + DATA.segVer;
  img.alt = p.title;

  const ch = DATA.chapters.find(c => c.first_page <= state.i &&
      (DATA.chapters[DATA.chapters.indexOf(c)+1]?.first_page ?? 1e9) > state.i);
  $("#ch").textContent = ch ? ch.title : "";
  $("#title").textContent = p.title;
  $("#text").textContent = p.text;
  $("#pos").textContent = `Page ${state.i+1} / ${DATA.pages.length}`;
  $("#prev").disabled = state.i === 0;
  $("#next").disabled = state.i === DATA.pages.length - 1;
  $("#bar").style.width = ((state.i+1)/DATA.pages.length*100) + "%";
  if (ch) $("#chap").value = ch.first_page;
  document.querySelector("main").scrollTop = 0;
  const r = document.querySelector(".read"); if (r) r.scrollTop = 0;
  save();
  prefetchAhead();   // warm the browser cache for upcoming pages
}

function go(n){ const ni = Math.max(0, Math.min(DATA.pages.length-1, state.i+n));
  if (ni!==state.i){ state.i = ni; render(); } }
function openMenu(){ $("#menu").hidden = false; }
function closeMenu(){ $("#menu").hidden = true; }

$("#img").addEventListener("click", e => {   // retry a failed image
  if ($("#img").classList.contains("loading")) { e.stopPropagation();
    $("#img").src = API + "/pages/" + DATA.pages[state.i].idx + "/image?r=" + Date.now(); }
});
$("#menuBtn").onclick = e => { e.stopPropagation(); openMenu(); };
$("#menu").onclick = e => { if (e.target === $("#menu")) closeMenu(); e.stopPropagation(); };
$("#close").onclick = e => { e.stopPropagation(); closeMenu(); };
$("#prev").onclick = e => { e.stopPropagation(); go(-1); };
$("#next").onclick = e => { e.stopPropagation(); go(1); };
$("#chap").onchange = e => { state.i = +e.target.value; render(); };

const fsEl = document.documentElement;
function fsSupported(){ return !!(fsEl.requestFullscreen || fsEl.webkitRequestFullscreen); }
function inFS(){ return document.fullscreenElement || document.webkitFullscreenElement; }
function toggleFS(){ try {
  if (inFS()) (document.exitFullscreen || document.webkitExitFullscreen).call(document);
  else (fsEl.requestFullscreen || fsEl.webkitRequestFullscreen).call(fsEl);
} catch(e){} }
function syncFS(){ $("#fs").textContent = (inFS() ? "⛶ Exit full screen" : "⛶ Full screen"); }
if (!fsSupported()) $("#fs").style.display = "none";
$("#fs").onclick = e => { e.stopPropagation(); toggleFS(); };
$("#bookview").onclick = e => { e.stopPropagation(); window.location.href = "/book/" + BOOK_ID; };
$("#closebook").onclick = e => {       // exit the book -> back to the library
  e.stopPropagation();
  try { if (inFS()) (document.exitFullscreen || document.webkitExitFullscreen).call(document); } catch (_) {}
  window.location.href = "/";
};
document.addEventListener("fullscreenchange", syncFS);
document.addEventListener("webkitfullscreenchange", syncFS);

// tap zones: left third = back, right third = forward. `moved` suppresses the
// click that follows a scroll/swipe so only true taps navigate.
let tx=null, ty=null, moved=false;
document.addEventListener("touchstart", e => { tx=e.touches[0].clientX; ty=e.touches[0].clientY; moved=false; }, {passive:true});
document.addEventListener("touchmove", e => {
  if (tx!==null && (Math.abs(e.touches[0].clientX-tx)>10 || Math.abs(e.touches[0].clientY-ty)>10)) moved=true;
}, {passive:true});
document.addEventListener("touchend", e => {
  if (tx===null) return;
  const dx = e.changedTouches[0].clientX - tx, dy = e.changedTouches[0].clientY - ty; tx=null;
  if (Math.abs(dx) > 60 && Math.abs(dx) > Math.abs(dy)) go(dx < 0 ? 1 : -1);
}, {passive:true});
document.addEventListener("click", e => {
  if (moved) { moved=false; return; }
  if (!$("#menu").hidden) return;
  if (e.target.closest("#menuBtn, #menu, #img")) return;
  const x = e.clientX / window.innerWidth;
  if (x < 0.33) go(-1); else if (x > 0.67) go(1);
});
document.addEventListener("keydown", e => {
  if (e.key === "ArrowRight" || e.key === " ") { go(1); e.preventDefault(); }
  if (e.key === "ArrowLeft") go(-1);
  if (e.key === "Escape") closeMenu();
});

boot();
</script>
</body></html>
