# Fully containerized HTTPS for phones/tablets, via a Tailscale sidecar.
# (PWA install + screen wake-lock need a secure context; this provides a trusted
#  HTTPS hostname over your private tailnet -- no public exposure, no per-device cert.)
#
# One-time setup:
#   1. Tailscale admin console -> DNS: enable MagicDNS and "HTTPS Certificates".
#   2. Generate an auth key (Settings -> Keys) and add it to .env:
#         TS_AUTHKEY=tskey-auth-...
#   3. docker compose -f docker-compose.tailscale.yml up --build -d
#   4. On the Pixel/tablet (Tailscale app installed + logged in), open
#         https://storyteller.<your-tailnet>.ts.net   ->  Install.
#
# The "ts" sidecar joins the tailnet as host "storyteller" and terminates HTTPS,
# proxying to the app; the app shares the sidecar's network namespace. The host
# port mapping still gives plain http://localhost access on the machine itself.
services:
  ts:
    image: tailscale/tailscale:latest
    hostname: storyteller                 # -> storyteller.<tailnet>.ts.net
    env_file:
      - .env                              # TS_AUTHKEY=tskey-...
    environment:
      TS_STATE_DIR: /var/lib/tailscale
      TS_SERVE_CONFIG: /config/serve.json
      TS_USERSPACE: "true"                # serve works without NET_ADMIN / /dev/net/tun
    volumes:
      - ./data/ts:/var/lib/tailscale      # tailscale identity persists across restarts
      - ./tailscale-serve.json:/config/serve.json:ro
    ports:
      - "${STORY_PORT:-8000}:8000"        # local http://localhost access on the host
    restart: unless-stopped

  storyteller:
    build: .
    network_mode: service:ts              # share the sidecar's network namespace
    env_file:
      - .env                              # GEMINI_API_KEY=...
    environment:
      STORY_PREFETCH: "4"
      STORY_WARM_PAGES: "2"
      STORY_GEN_CONCURRENCY: "3"
    volumes:
      - ./data:/data
    depends_on:
      - ts
    restart: unless-stopped
